<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FLACOBOi</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <section class="intro">
    <h1 class="intro-text">No sé explicar lo que siento...</h1>
    <img src="assets/ghost.png" class="ghost idle" id="ghost">
  </section>

  <section class="middle">
    <h2>Pero sigo cayendo</h2>
  </section>

  <section class="cta">

  <img src="assets/song-logo.png" class="song-logo" alt="Título de la canción">

  <video id="ctaVideo" autoplay muted loop class="cta-video">
  <source src="assets/final-bg.mp4" type="video/mp4">
  </video>

  <div class="cta-buttons">
    <a href="https://presave-link.com" target="_blank" class="btn primary">
      Presave ahora
    </a>

    <a href="https://www.youtube.com/@flaco.boiiii" target="_blank" class="btn secondary">
      Ver en YouTube
    </a>
  </div>

  <img src="assets/flacoboi-logo.png" class="brand-logo" alt="FLACOBOi">

  <canvas id="particles"></canvas>

</section>

  <audio id="ambientSound" src="assets/ambient.mp3" loop></audio>

  <script src="script.js"></script>

  <div class="noise-overlay"></div>
  
</body>
</html>
